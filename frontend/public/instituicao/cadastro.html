<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Graduando</title>
    <link rel="stylesheet" href="../../public/styles/instituicao/cadastroInstituicao.css">
</head>
<body>

    <a href="../hub.html" class="voltar">←</a>

    <div class="container">

        <img src="../../src/img/logo.png" alt="Gradway" class="logo">

        <h3>Preenchimento Inteligente:</h3>
        <p class="subtitulo">Contrato Social</p>

        <label class="upload">
            <input type="file">
            ⤴
        </label>

        <form>

            <div class="campo">
                <label>Nome da Instituição</label>
                <input type="text">
            </div>

            <div class="campo">
                <label>E-mail do Responsável</label>
                <input type="email">
            </div>

            <div class="linha">
                <div class="campo">
                    <label>CNPJ</label>
                    <input type="text">
                </div>

                <div class="campo">
                    <label>Quantidade Alunos</label>
                        <input type="number">
                </div>
            </div>

            <div class="linha">
                <div class="campo">
                    <label>Telefone 1</label>
                    <input type="text">
                </div>

                <div class="campo">
                    <label>Telefone 2</label>
                    <input type="text"> 
                </div>
            </div>

            <div class="linha">
                <div class="campo endereco">
                    <label>Endereço Comercial</label>
                    <input type="text">
                </div>

                <div class="campo numero">
                    <label>Número</label>
                    <input type="text">
                </div>
            </div>

            <div class="linha">
                <div class="campo endereco">
                    <label>Cidade</label>
                    <input type="text">
                </div>

                <div class="campo numero">
                    <label>UF</label>
                    <input type="text" maxlength="2">
                </div>
            </div>

            <div class="competencias">

                <h4>Área Acadêmica</h4>

                <input
                    type="text"
                    placeholder="🔍 Pesquisar área acadêmica..."
                    class="pesquisa"
                >

                <div class="tags">
                    <button type="button">Saúde</button>
                    <button type="button">Engenharia</button>
                    <button type="button">Design</button>
                </div>

            </div>

            <button type="button" class="btn-finalizar" onclick="window.location.href='../usuario/inicio.html'">
                FINALIZAR
            </button>

        </form>

    </div>

</body>
</html>
