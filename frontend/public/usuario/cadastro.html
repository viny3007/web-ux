<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Grad</title>
    <link rel="stylesheet" href="../../public/styles/cadastro.css">
</head>
<body>

<div class="background">
    <div class="overlay"></div>
</div>

<div class="login-container">
    <div class="login-box">
        <h2>🎓 GRAD</h2>

        <input type="email" placeholder="E-mail">
        <input type="password" placeholder="Senha">

        <a href="#" class="register">Cadastre-se agora!</a>

        <button class="btn-primary">Entrar</button>
    </div>

    <div class="social-login">
        <button class="google">Continue com o Google</button>
        <button class="microsoft">Continue com a Microsoft</button>
        <button class="apple">Continue com a Apple</button>
    </div>
</div>

</body>
</html>
