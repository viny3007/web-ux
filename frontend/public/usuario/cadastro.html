<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Graduando</title>
    <link rel="stylesheet" href="../../public/styles/usuario/cadastroUsuario.css">
</head>
<body>

    <a href="../hub.html" class="voltar">←</a>

    <div class="container">

        <img src="../../src/img/logo.png" alt="Gradway" class="logo">

        <h3>Preenchimento Inteligente:</h3>
        <p>Carregar Currículo</p>

        <label class="upload">
            <input type="file">
            ⤴
        </label>

        <form>

            <div class="campo">
                <label>Nome Completo</label>
                <input type="text">
            </div>

            <div class="campo">
                <label>E-mail</label>
                <input type="email">
            </div>

            <div class="linha">
                <div class="campo">
                    <label>CPF</label>
                    <input type="text">
                </div>

                <div class="campo">
                    <label>Cor/Etnia</label>
                    <select>
                        <option></option>
                        <option>Branca</option>
                        <option>Preta</option>
                        <option>Parda</option>
                        <option>Amarela</option>
                        <option>Indígena</option>
                    </select>
                </div>
            </div>

            <div class="linha">
                <div class="campo">
                    <label>Telefone</label>
                    <input type="text">
                </div>

                <div class="campo">
                    <label>Data de Nascimento</label>
                    <input type="date">
                </div>
            </div>

            <div class="campo">
                <label>Instituição Matriculado(a)</label>
                <input type="text">
            </div>

            <div class="linha">
                <div class="campo endereco">
                    <label>Endereço Residencial</label>
                    <input type="text">
                </div>

                <div class="campo numero">
                    <label>Número</label>
                    <input type="text">
                </div>
            </div>

            <div class="linha">
                <div class="campo endereco">
                    <label>Cidade</label>
                    <input type="text">
                </div>

                <div class="campo numero">
                    <label>UF</label>
                    <input type="text" maxlength="2">
                </div>
            </div>

            <div class="competencias">

                <h4>Competências</h4>

                <input
                    type="text"
                    placeholder="🔍 Pesquisar competência..."
                    class="pesquisa"
                >

                <div class="tags">
                    <button type="button">Inglês</button>
                    <button type="button">Python</button>
                    <button type="button">Web e UX</button>
                </div>

            </div>

            <button type="button" class="btn-finalizar" onclick="window.location.href='../usuario/inicio.html'">
                FINALIZAR
            </button>

        </form>

    </div>

</body>
</html>
