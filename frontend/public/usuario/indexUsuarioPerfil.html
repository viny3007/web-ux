<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aba Perfil do Usuário</title>
    <link rel="stylesheet" href="../../public/styles/usuario.css">
</head>
<body>
    <header class="header">
    <div class="menu-container">

        <div class="logo">
            <img src="../../src/img/logo.png" alt="">
        </div>

        <nav class="menu">
            <a href="#" class="active">Vagas</a>
            <a href="#">Rede</a>
        </nav>

        <div class="acoes">
            <button class="btn-add">
                +
            </button>

            <a href="#" class="perfil">
                <i class="fas fa-user"></i>
            </a>
        </div>

    </div>
</header>

    <!-- quadrado do perfil -->
     <div class="quadrado-perfil"></div>

    <!-- Ícone de perfil -->
    <button class="foto-perfil">
        <i class="bi bi-person-circle"></i>
    </button>

    <!-- Icone fundo do perfil-->
    <button class="fundo-perfil">
        <i class="bi bi-camera-fill"></i>
    </button>

    <!-- Nome do perfil -->
    <div class="nome-perfil">Estudante</div>

    <!-- Preferências do perfil -->
    <div class="preferencias-perfil">Preferências</div>

    <!-- Informações do perfil -->
    <div class="informacoes-perfil">Informações sobre Você:</div>

    <!-- Editar perfil -->
    <div class="editar-perfil">Editar Perfil</div>

    <!-- Experiências do perfil -->
    <div class="experiencia-perfil">Experiências:</div>

    <!-- Empresa 1 -->
    <div class="empresa-1">Empresa 1</div>

    <!-- Empresa 2 -->
    <div class="empresa-2">Empresa 2</div>

</body>
</html>
